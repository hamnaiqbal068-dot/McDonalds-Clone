<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | McDonald's</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="login-page">

    <div class="login-box">

        <h2>Welcome Back 🍟</h2>

        <p>Login to your McDonald's account</p>

        <input
            type="email"
            id="loginEmail"
            placeholder="Email">

        <input
            type="password"
            id="loginPassword"
            placeholder="Password">

        <button id="loginBtn">
            Login
        </button>

        <p class="signup-link">

            Don't have an account?

            <a href="signup.html">
                Sign Up
            </a>

        </p>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
