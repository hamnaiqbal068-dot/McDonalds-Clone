<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | McDonald's</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="login-page">

    <div class="login-box">

        <h2>Create Account 🍟</h2>

        <p>Join McDonald's today!</p>

        <input
            type="text"
            id="signupName"
            placeholder="Full Name">

        <input
            type="email"
            id="signupEmail"
            placeholder="Email">

        <input
            type="password"
            id="signupPassword"
            placeholder="Password">

        <button id="signupBtn">
            Create Account
        </button>

        <p class="signup-link">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
